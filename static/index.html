<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>IDS Console</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0d13;
    --panel: #10141d;
    --panel-border: #1e2530;
    --text: #dde3ed;
    --text-dim: #6b7688;
    --info: #4f9eff;
    --warn: #ffab2e;
    --crit: #ff4d5e;
    --ok: #3ddc84;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
    position: relative;
    overflow-x: hidden;
  }

  body::before {
    content: "";
    position: fixed;
    inset: 0;
    pointer-events: none;
    background: repeating-linear-gradient(
      0deg,
      rgba(255,255,255,0.012) 0px,
      rgba(255,255,255,0.012) 1px,
      transparent 1px,
      transparent 3px
    );
    z-index: 1000;
  }

  .wrap {
    max-width: 1180px;
    margin: 0 auto;
    padding: 28px 24px 64px;
  }

  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding-bottom: 20px;
    border-bottom: 1px solid var(--panel-border);
    margin-bottom: 24px;
  }

  .brand {
    display: flex;
    align-items: baseline;
    gap: 12px;
  }

  .brand h1 {
    font-family: 'JetBrains Mono', monospace;
    font-size: 20px;
    font-weight: 700;
    letter-spacing: 0.02em;
  }

  .brand .tag {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--text-dim);
    letter-spacing: 0.08em;
  }

  .status {
    display: flex;
    align-items: center;
    gap: 8px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    letter-spacing: 0.06em;
    color: var(--text-dim);
  }

  .status .dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--text-dim);
    position: relative;
    flex-shrink: 0;
  }

  .status.live .dot {
    background: var(--ok);
    box-shadow: 0 0 0 0 rgba(61, 220, 132, 0.6);
    animation: pulse 1.8s infinite;
  }

  .status.live { color: var(--ok); }

  @keyframes pulse {
    0%   { box-shadow: 0 0 0 0 rgba(61, 220, 132, 0.55); }
    70%  { box-shadow: 0 0 0 8px rgba(61, 220, 132, 0); }
    100% { box-shadow: 0 0 0 0 rgba(61, 220, 132, 0); }
  }

  .stats {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
    margin-bottom: 24px;
  }

  .stat-card {
    background: var(--panel);
    border: 1px solid var(--panel-border);
    border-radius: 6px;
    padding: 16px 18px;
  }

  .stat-card .num {
    font-family: 'JetBrains Mono', monospace;
    font-size: 26px;
    font-weight: 700;
    line-height: 1;
  }

  .stat-card .label {
    font-size: 11px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-top: 6px;
  }

  .stat-card.crit .num { color: var(--crit); }
  .stat-card.warn .num { color: var(--warn); }
  .stat-card.info .num { color: var(--info); }

  .filters {
    display: flex;
    gap: 8px;
    margin-bottom: 16px;
    flex-wrap: wrap;
  }

  .filter-btn {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.04em;
    background: transparent;
    border: 1px solid var(--panel-border);
    color: var(--text-dim);
    padding: 6px 12px;
    border-radius: 4px;
    cursor: pointer;
    transition: all 0.15s ease;
  }

  .filter-btn:hover {
    border-color: var(--text-dim);
    color: var(--text);
  }

  .filter-btn.active {
    background: var(--text);
    border-color: var(--text);
    color: var(--bg);
  }

  .panel {
    background: var(--panel);
    border: 1px solid var(--panel-border);
    border-radius: 8px;
    overflow: hidden;
  }

  table {
    width: 100%;
    border-collapse: collapse;
  }

  thead th {
    text-align: left;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--text-dim);
    font-weight: 600;
    padding: 12px 16px;
    border-bottom: 1px solid var(--panel-border);
  }

  tbody tr {
    border-bottom: 1px solid var(--panel-border);
    transition: background 0.15s ease;
  }

  tbody tr:last-child { border-bottom: none; }

  tbody tr:hover { background: rgba(255,255,255,0.02); }

  tbody td {
    padding: 11px 16px;
    font-size: 13px;
    vertical-align: middle;
  }

  td.mono, .mono {
    font-family: 'JetBrains Mono', monospace;
  }

  td.time { color: var(--text-dim); font-size: 12px; white-space: nowrap; }

  td.detail { color: var(--text-dim); }

  .badge {
    display: inline-block;
    padding: 3px 9px;
    border-radius: 4px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.03em;
    white-space: nowrap;
  }

  .badge.sev-1 { background: rgba(79,158,255,0.14); color: var(--info); }
  .badge.sev-2 { background: rgba(255,171,46,0.14); color: var(--warn); }
  .badge.sev-3 { background: rgba(255,77,94,0.14); color: var(--crit); }

  .rule-tag {
    font-weight: 600;
    font-size: 12.5px;
  }

  .empty {
    padding: 48px 20px;
    text-align: center;
    color: var(--text-dim);
  }

  .empty .big {
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    margin-bottom: 6px;
  }

  .new-row {
    animation: flash-in 1.1s ease-out;
  }

  @keyframes flash-in {
    from { background: rgba(255,77,94,0.16); }
    to   { background: transparent; }
  }

  @media (max-width: 720px) {
    .stats { grid-template-columns: repeat(2, 1fr); }
    td.detail { display: none; }
  @media (max-width: 900px) {
    td:nth-child(5) { display: none; }
  } 
 }
</style>
</head>
<body>

<div class="wrap">

  <header>
    <div class="brand">
      <h1>IDS_CONSOLE</h1>
      <span class="tag">// alert monitor</span>
    </div>
    <div class="status" id="status">
      <span class="dot"></span>
      <span id="status-text">CONNECTING</span>
    </div>
  </header>

  <div class="stats">
    <div class="stat-card">
      <div class="num" id="stat-total">0</div>
      <div class="label">Total Alerts</div>
    </div>
    <div class="stat-card crit">
      <div class="num" id="stat-crit">0</div>
      <div class="label">Critical</div>
    </div>
    <div class="stat-card warn">
      <div class="num" id="stat-warn">0</div>
      <div class="label">Warning</div>
    </div>
    <div class="stat-card info">
      <div class="num" id="stat-info">0</div>
      <div class="label">Info</div>
    </div>
  </div>

  <div class="filters" id="filters">
    <button class="filter-btn active" data-filter="all">ALL</button>
    <button class="filter-btn" data-filter="3">CRITICAL</button>
    <button class="filter-btn" data-filter="2">WARNING</button>
    <button class="filter-btn" data-filter="1">INFO</button>
  </div>

  <div class="panel">
    <table>
      <thead>
        <tr>
          <th style="width:150px;">Time</th>
          <th style="width:90px;">Severity</th>
          <th style="width:160px;">Rule</th>
          <th style="width:140px;">Source IP</th>
          <th style="width:110px;">Sensor</th>
	  <th style="width:150px;">Suspected OS</th>
          <th>Detail</th>
        </tr>
      </thead>
      <tbody id="alert-body">
      </tbody>
    </table>
    <div class="empty" id="empty-state" style="display:none;">
      <div class="big">NO ALERTS YET</div>
      <div>Listening for events from the IDS backend&hellip;</div>
    </div>
  </div>

</div>

<script>
  // Backend contract expected here:
  //   GET  /api/alerts   -> JSON array of alert objects, newest first
  //                         [{ rule, src, detail, severity, ts, sensor }, ...]
  //   GET  /api/stats    -> { total, by_rule: {...}, by_severity: {"1":n,"2":n,"3":n} }
  //   GET  /stream       -> Server-Sent Events; each `data:` line is one
  //                         alert object (same shape as above), pushed live.

  const SEV_LABEL = { 1: "INFO", 2: "WARN", 3: "CRIT" };
  let currentFilter = "all";
  let allAlerts = [];

  const tbody = document.getElementById("alert-body");
  const emptyState = document.getElementById("empty-state");
  const statusEl = document.getElementById("status");
  const statusText = document.getElementById("status-text");

  function fmtTime(ts) {
    const d = new Date(ts * 1000);
    return d.toLocaleTimeString([], { hour12: false }) +
           "." + String(d.getMilliseconds()).padStart(3, "0");
  }

function rowHTML(a, isNew) {
    const sev = a.severity || 2;
    const osGuess = a.os_guess ? a.os_guess : '<span style="color:var(--text-dim)">—</span>';
    const sensor = a.sensor || 'kali-sensor';
    const sensorColor = sensor === 'pi-sensor' ? 'var(--info)' : 'var(--ok)';
    return `
      <tr class="${isNew ? 'new-row' : ''}" data-sev="${sev}">
        <td class="time mono">${fmtTime(a.ts)}</td>
        <td><span class="badge sev-${sev}">${SEV_LABEL[sev] || sev}</span></td>
        <td class="rule-tag mono">${a.rule}</td>
        <td class="mono">${a.src}</td>
        <td class="mono" style="color:${sensorColor}; font-size:11px; font-weight:600;">${sensor}</td>
        <td class="mono" style="color:var(--text-dim); font-size:12px;">${osGuess}</td>
        <td class="detail">${a.detail}</td>
      </tr>`;
}

  function applyFilter() {
    const rows = tbody.querySelectorAll("tr");
    let visibleCount = 0;
    rows.forEach(r => {
      const match = currentFilter === "all" || r.dataset.sev === currentFilter;
      r.style.display = match ? "" : "none";
      if (match) visibleCount++;
    });
    emptyState.style.display = visibleCount === 0 ? "block" : "none";
  }

  function renderAll(alerts) {
    allAlerts = alerts;
    tbody.innerHTML = alerts.map(a => rowHTML(a, false)).join("");
    applyFilter();
  }

  function prependAlert(a) {
    allAlerts.unshift(a);
    tbody.insertAdjacentHTML("afterbegin", rowHTML(a, true));
    applyFilter();
    bumpStats(a.severity);
  }

  function bumpStats(sev) {
    const totalEl = document.getElementById("stat-total");
    totalEl.textContent = (parseInt(totalEl.textContent, 10) || 0) + 1;
    const map = { 1: "stat-info", 2: "stat-warn", 3: "stat-crit" };
    const el = document.getElementById(map[sev]);
    if (el) el.textContent = (parseInt(el.textContent, 10) || 0) + 1;
  }

  function loadStats() {
    fetch("/api/stats")
      .then(r => r.json())
      .then(s => {
        document.getElementById("stat-total").textContent = s.total || 0;
        const bySev = s.by_severity || {};
        document.getElementById("stat-crit").textContent = bySev["3"] || 0;
        document.getElementById("stat-warn").textContent = bySev["2"] || 0;
        document.getElementById("stat-info").textContent = bySev["1"] || 0;
      })
      .catch(() => {});
  }

  function loadInitialAlerts() {
    fetch("/api/alerts")
      .then(r => r.json())
      .then(renderAll)
      .catch(() => {
        emptyState.style.display = "block";
      });
  }

  function connectStream() {
    const es = new EventSource("/stream");

    es.onopen = () => {
      statusEl.classList.add("live");
      statusText.textContent = "LISTENING";
    };

    es.onmessage = (e) => {
      try {
        const alert = JSON.parse(e.data);
        prependAlert(alert);
      } catch (err) { /* ignore malformed payloads */ }
    };

    es.onerror = () => {
      statusEl.classList.remove("live");
      statusText.textContent = "RECONNECTING";
    };
  }

  document.getElementById("filters").addEventListener("click", (e) => {
    if (!e.target.classList.contains("filter-btn")) return;
    document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
    e.target.classList.add("active");
    currentFilter = e.target.dataset.filter;
    applyFilter();
  });

  loadInitialAlerts();
  loadStats();
  connectStream();
</script>

</body>
</html>
